<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backdoor Admin — Login</title>
    <link rel="stylesheet" href="admin.css">
</head>

<body class="login-body">

    <div class="login-wrap">
        <div class="login-card">

            <!-- Logo -->
            <div class="login-logo">
                <span class="logo-text">BACKDOOR</span>
                <span class="logo-sub">Admin Panel</span>
            </div>

            <!-- Error Message -->
            <div class="login-error" id="loginError">
                Invalid email or password.
            </div>

            <!-- Form -->
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="admin@backdoor.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrap">
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                        <button type="button" class="toggle-pw" id="togglePw">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8
                                         11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">
                    <span>Sign In</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7" />
                    </svg>
                </button>
            </form>

        </div>
    </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { signInWithEmailAndPassword } from
            'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';

        // Redirect if already logged in
        auth.onAuthStateChanged(user => {
            if (user) window.location.href = 'dashboard.html';
        });

        const form = document.getElementById('loginForm');
        const error = document.getElementById('loginError');
        const btn = document.getElementById('loginBtn');
        const togglePw = document.getElementById('togglePw');
        const pwInput = document.getElementById('loginPassword');

        // Toggle password visibility
        togglePw.addEventListener('click', () => {
            pwInput.type =
                pwInput.type === 'password' ? 'text' : 'password';
        });

        // Login
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.innerHTML = '<span>Signing in...</span>';
            btn.disabled = true;
            error.style.display = 'none';

            const email = document.getElementById('loginEmail').value;
            const password = pwInput.value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'dashboard.html';
            } catch (err) {
                error.style.display = 'block';
                btn.innerHTML = `<span>Sign In</span>
                    <svg width="16" height="16" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor"
                         stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>`;
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>

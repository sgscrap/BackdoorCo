<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Prada | Backdoor Admin</title>
    <link rel="stylesheet" href="admin.css?v=2.2">
    <style>
        .seed-wrap {
            max-width: 560px;
            margin: 80px auto;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
        }

        .seed-img-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
        }

        .seed-img-grid img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            display: block;
        }

        .seed-body {
            padding: 32px;
        }

        .seed-title {
            font-family: "Bebas Neue", cursive;
            font-size: 26px;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .seed-meta {
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .seed-tag {
            padding: 3px 10px;
            border: 1px solid var(--border-light);
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .seed-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 12px;
            font-family: "Bebas Neue", cursive;
            font-size: 18px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .seed-btn:hover:not(:disabled) {
            background: var(--accent-dark);
            transform: translateY(-2px);
        }

        .seed-btn:disabled {
            opacity: 0.5;
            cursor: default;
        }

        .seed-status {
            margin-top: 16px;
            font-size: 0.88rem;
            text-align: center;
            color: var(--text-secondary);
            min-height: 22px;
        }

        .seed-status.success {
            color: var(--accent);
        }

        .seed-status.error {
            color: var(--accent-red);
        }
    </style>
</head>

<body class="admin-body" style="display:flex;align-items:flex-start;justify-content:center;padding:40px 20px">

    <div class="seed-wrap">
        <div class="seed-img-grid" id="imgGrid">
            <img src="https://i.imgur.com/t4bfjfm.jpg" alt="Prada 1" onerror="this.style.display='none'">
            <img src="https://i.imgur.com/W2Kt3Mw.jpg" alt="Prada 2" onerror="this.style.display='none'">
            <img src="https://i.imgur.com/OtEXQRd.jpg" alt="Prada 3" onerror="this.style.display='none'">
            <img src="https://i.imgur.com/pw1X396.jpg" alt="Prada 4" onerror="this.style.display='none'">
            <img src="https://i.imgur.com/sx9DTxP.jpg" alt="Prada 5" onerror="this.style.display='none'">
            <img src="https://i.imgur.com/6V6Xxuh.jpg" alt="Prada 6" onerror="this.style.display='none'">
        </div>

        <div class="seed-body">
            <div class="seed-title">Prada America's Cup<br>Papaya Silver</div>
            <div class="seed-meta">
                <span class="seed-tag">Prada</span>
                <span class="seed-tag">Sneakers</span>
                <span class="seed-tag">Papaya / Silver</span>
                <span class="seed-tag">6 images</span>
            </div>

            <button class="seed-btn" id="addBtn" onclick="addProduct()">
                Add to Store
            </button>
            <div class="seed-status" id="status">Requires admin login.</div>
        </div>
    </div>

    <script type="module">
        import { db, auth } from './firebase-config.js';
        import { collection, addDoc } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';

        const btn = document.getElementById('addBtn');
        const status = document.getElementById('status');

        let authed = false;

        onAuthStateChanged(auth, user => {
            if (!user) {
                status.textContent = 'Not logged in — redirecting to admin login…';
                setTimeout(() => window.location.href = 'index.html', 1500);
            } else {
                authed = true;
                status.textContent = `Logged in as ${user.email}. Ready to add.`;
            }
        });

        const IMAGES = [
            'https://i.imgur.com/t4bfjfm.jpg',
            'https://i.imgur.com/W2Kt3Mw.jpg',
            'https://i.imgur.com/OtEXQRd.jpg',
            'https://i.imgur.com/pw1X396.jpg',
            'https://i.imgur.com/sx9DTxP.jpg',
            'https://i.imgur.com/6V6Xxuh.jpg',
        ];

        window.addProduct = async () => {
            if (!authed) return;
            btn.disabled = true;
            btn.textContent = 'Adding…';
            status.className = 'seed-status';
            status.textContent = 'Writing to Firestore…';

            try {
                const ref = await addDoc(collection(db, 'products'), {
                    name: "Prada America's Cup Papaya Silver",
                    sku: 'PR-AC-PAPAYA-SLV',
                    brand: 'Prada',
                    category: 'Sneakers',
                    colorway: 'Papaya/Silver',
                    price: 895,
                    stock: 10,
                    status: 'active',
                    featured: true,
                    image: IMAGES[0],
                    images: IMAGES,
                    sizes: '6, 7, 8, 9, 10, 11, 12, 13',
                    desc: "The Prada America's Cup sneaker in Papaya and Silver. Technical nylon and leather upper with the iconic Prada logo tape, rubber cupsole, and grippy outsole. A staple of the Prada sportswear lineage.",
                    createdAt: new Date(),
                    updatedAt: new Date(),
                });

                status.className = 'seed-status success';
                status.textContent = `✓ Added! Product ID: ${ref.id}`;
                btn.textContent = 'Done ✓';

                setTimeout(() => window.location.href = 'products.html', 2000);
            } catch (err) {
                status.className = 'seed-status error';
                status.textContent = `Error: ${err.message}`;
                btn.disabled = false;
                btn.textContent = 'Add to Store';
            }
        };
    </script>
</body>

</html>

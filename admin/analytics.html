<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics | Backdoor Admin</title>
    <link rel="stylesheet" href="admin.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body class="admin-body">
    <aside class="sidebar">
        <div class="sidebar-logo"><span class="sidebar-logo-text">B</span><span class="sidebar-brand">BACKDOOR</span>
        </div>
        <div class="sidebar-user">
            <div class="user-avatar" id="userAvatar">A</div>
            <div class="user-info"><span class="user-name" id="userName">Admin</span><span class="user-role">Super
                    Admin</span></div>
        </div>
        <nav class="sidebar-nav">
            <p class="nav-label">MAIN</p>
            <a href="dashboard.html" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.8">
                    <rect x="3" y="3" width="7" height="7" />
                    <rect x="14" y="3" width="7" height="7" />
                    <rect x="14" y="14" width="7" height="7" />
                    <rect x="3" y="14" width="7" height="7" />
                </svg> Dashboard</a>
            <a href="orders.html" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.8">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <path d="M16 10a4 4 0 0 1-8 0" />
                </svg> Orders <span class="nav-badge" id="ordersBadge">0</span></a>
            <a href="products.html" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.8">
                    <path
                        d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                </svg> Products <span class="nav-badge" id="productsBadge">0</span></a>
            <a href="customers.html" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.8">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                    <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                </svg> Customers</a>
            <p class="nav-label">TOOLS</p>
            <a href="analytics.html" class="nav-item active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.8">
                    <line x1="18" y1="20" x2="18" y2="10" />
                    <line x1="12" y1="20" x2="12" y2="4" />
                    <line x1="6" y1="20" x2="6" y2="14" />
                </svg> Analytics</a>
            <a href="settings.html" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.8">
                    <circle cx="12" cy="12" r="3" />
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14" />
                </svg> Settings</a>
        </nav>
        <button class="logout-btn" id="logoutBtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <polyline points="16 17 21 12 16 7" />
                <line x1="21" y1="12" x2="9" y2="12" />
            </svg> Logout</button>
    </aside>

    <main class="admin-main">
        <div class="admin-topbar">
            <div class="topbar-left">
                <h1 class="page-title">ANALYTICS</h1>
                <p class="page-subtitle">Track your store performance.</p>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="metric-card">
                    <div class="metric-value" id="totalRev">$0</div>
                    <div class="metric-label">Total Revenue</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="metric-card">
                    <div class="metric-value" id="avgOrder">$0</div>
                    <div class="metric-label">Avg. Order Value</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="metric-card">
                    <div class="metric-value" id="convRate">0%</div>
                    <div class="metric-label">Conversion Rate</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="metric-card">
                    <div class="metric-value" id="totalItems">0</div>
                    <div class="metric-label">Items Sold</div>
                </div>
            </div>
        </div>

        <div class="grid-2">
            <div class="card">
                <div class="card-header"><span class="card-title">MONTHLY REVENUE</span></div>
                <div class="card-body">
                    <div class="chart-container"><canvas id="revenueChart"></canvas></div>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><span class="card-title">ORDERS BY STATUS</span></div>
                <div class="card-body">
                    <div class="chart-container"><canvas id="statusChart"></canvas></div>
                </div>
            </div>
        </div>

        <div class="grid-2">
            <div class="card">
                <div class="card-header"><span class="card-title">TOP PRODUCTS</span></div>
                <div class="card-body" id="topProducts">
                    <p style="color:var(--text-muted);text-align:center;padding:20px">No data yet.</p>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><span class="card-title">SALES BY CATEGORY</span></div>
                <div class="card-body">
                    <div class="chart-container"><canvas id="categoryChart"></canvas></div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="analytics.js"></script>
</body>

</html>
